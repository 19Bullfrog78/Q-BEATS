name: iOS Signed Build

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.P12_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | tr -d '\n\r ' | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

      - name: Install Provisioning Profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | tr -d '\n\r ' | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/QBeats_Dev_Profile.mobileprovision

      - name: Build and Archive
        run: |
          xcodebuild -project QBeats.xcodeproj \
                     -scheme QBeats \
                     -archivePath QBeats.xcarchive \
                     -sdk iphoneos \
                     -configuration Release \
                     archive \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGN_IDENTITY="Apple Development" \
                     PROVISIONING_PROFILE_SPECIFIER="QBeats_Dev_Profile"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                     -archivePath QBeats.xcarchive \
                     -exportOptionsPlist exportOptions.plist \
                     -exportPath build/output

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: QBeats-App-Installable
          path: build/output/*.ipa
