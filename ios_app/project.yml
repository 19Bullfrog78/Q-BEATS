name: QBeats
options:
  bundleIdPrefix: com.bullfrog

targets:
  QBeats:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: QBeats
      - path: ../core_engine
        name: CoreEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bullfrog.qbeats
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_CXX_LIBRARY: "libc++"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../core_engine"
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
