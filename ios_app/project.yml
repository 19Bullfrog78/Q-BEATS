name: QBeats
options:
  bundleIdPrefix: com.bullfrog

targets:
  QBeats:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    info:
      path: QBeats/Info.plist
      properties:
        NSLocalNetworkUsageDescription: "Q-BEATS uses the local network to connect to Network MIDI sessions on other devices."
        ABLLinkStartStopSyncSupported: true
        NSBluetoothAlwaysUsageDescription: "Q-BEATS richiede l'accesso al Bluetooth per connettere controller e tastiere MIDI Bluetooth LE."
        NSBluetoothPeripheralUsageDescription: "Q-BEATS richiede l'accesso al Bluetooth per connettere controller e tastiere MIDI Bluetooth LE."
        NSBonjourServices:
          - "_apple-midi._tcp."
        UIBackgroundModes:
          - audio
    frameworks:
      - CoreAudio.framework
      - CoreMIDI.framework
      - AVFoundation.framework
      - CoreAudioKit.framework
      # === MODIFICATO 6A ===
      - path: ../Vendors/AbletonLink/LinkKit.xcframework
    resources:
      - path: ../Vendors/AbletonLink/LinkKitResources.bundle
        codeSignOnCopy: true
    sources:
      - path: QBeats
      - path: ../core_engine
        name: CoreEngine
        excludes:
          - "CMakeLists.txt"
          - "tests/**"
          - "test_main.cpp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bullfrog.qbeats
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_CXX_LIBRARY: "libc++"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../core_engine"
          - "$(SRCROOT)/../Vendors/AbletonLink/LinkKit.xcframework/ios-arm64/Headers"
          - "$(SRCROOT)/../Vendors/AbletonLink/LinkKit.xcframework/ios-arm64_x86_64-simulator/Headers"
        FRAMEWORK_SEARCH_PATHS:
          - "$(SRCROOT)/../Vendors/AbletonLink"
        OTHER_LDFLAGS:
          - "-lc++"
          - "-L$(SRCROOT)/../Vendors/AbletonLink/LinkKit.xcframework/ios-arm64"
          - "-lLinkKit"
        SWIFT_OBJC_BRIDGING_HEADER: "QBeats/QBeats-Bridging-Header.h"
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
