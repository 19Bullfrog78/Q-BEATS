name: QBeats
options:
  bundleIdPrefix: com.bullfrog

targets:
  QBeats:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    info:
      NSLocalNetworkUsageDescription: "Q-BEATS uses the local network to connect to Network MIDI sessions on other devices."
      NSBonjourServices:
        - "_apple-midi._tcp."
    entitlements:
      com.apple.developer.networking.multicast: true
    sources:
      - path: QBeats
      - path: ../core_engine
        name: CoreEngine
        excludes:
          - "CMakeLists.txt"
          - "tests/**"
          - "test_main.cpp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bullfrog.qbeats
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_CXX_LIBRARY: "libc++"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../core_engine"
        SWIFT_OBJC_BRIDGING_HEADER: "QBeats/QBeats-Bridging-Header.h"
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
